<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語單字學習系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div id="app" class="max-w-3xl mx-auto">
        <!-- 首頁：按鈕選擇區 -->
        <div id="homeView">
            <h1 class="text-3xl font-bold mb-8 text-gray-800 text-center">請選擇年級</h1>
            <div class="flex justify-center">
                <button onclick="loadWordList('A')" class="bg-blue-600 text-white py-4 px-10 rounded-xl font-bold text-xl hover:bg-blue-700 transition shadow-lg">
                    週次A
                </button>
            </div>
        </div>

        <!-- 列表頁：隱藏狀態 -->
        <div id="listView" class="hidden">
            <div class="flex items-center mb-6">
                <button onclick="location.reload()" class="mr-4 p-2 bg-gray-200 rounded-full hover:bg-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h1 id="title" class="text-2xl font-bold text-gray-800">單字列表</h1>
            </div>
            <div id="wordList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // 設定 CSV 檔案路徑
        const CSV_PATH = 'vocabulary.csv';

        async function loadWordList(grade) {
            try {
                const response = await fetch(CSV_PATH + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error('無法讀取 CSV 檔案');
                
                const text = await response.text();
                const rows = text.split(/\r?\n/);
                const listContainer = document.getElementById('wordList');
                
                document.getElementById('homeView').classList.add('hidden');
                document.getElementById('listView').classList.remove('hidden');
                document.getElementById('title').innerText = grade + " 年級單字列表";
                listContainer.innerHTML = '';

                rows.forEach((row, index) => {
                    if (index === 0 || !row.trim()) return;
                    const cols = row.split(',').map(s => s.trim());
                    
                    // 根據 CSV 結構：序號,年級,英文,中文,音檔位置
                    // 檢查年級欄位 (cols[1]) 是否符合所選年級
                    if (cols.length >= 5 && cols[1] === grade) {
                        const wordDiv = document.createElement('div');
                        wordDiv.className = "bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex justify-between items-center";
                        wordDiv.innerHTML = `
                            <div>
                                <h3 class="font-bold text-lg text-gray-800">${cols[2]}</h3>
                                <p class="text-gray-600">${cols[3] || ''}</p>
                            </div>
                            ${cols[4] ? `<audio controls src="${cols[4]}" class="h-8"></audio>` : '<span class="text-xs text-gray-300">無音檔</span>'}
                        `;
                        listContainer.appendChild(wordDiv);
                    }
                });
            } catch (err) {
                alert('讀取失敗：' + err.message);
            }
        }
    </script>
</body>
</html>
