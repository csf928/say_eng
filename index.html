<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語單字學習系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div id="app" class="max-w-3xl mx-auto">
        <!-- 首頁：按鈕選擇區 -->
        <div id="homeView">
            <h1 class="text-3xl font-bold mb-8 text-gray-800 text-center">請選擇週次</h1>
            <div id="buttonContainer" class="grid grid-cols-2 sm:grid-cols-4 gap-4 justify-center">
                <!-- 按鈕將由 JavaScript 動態生成 -->
            </div>
        </div>

        <!-- 列表頁：隱藏狀態 -->
        <div id="listView" class="hidden">
            <div class="flex items-center mb-6">
                <button onclick="location.reload()" class="mr-4 p-2 bg-gray-200 rounded-full hover:bg-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h1 id="title" class="text-2xl font-bold text-gray-800">單字列表</h1>
            </div>
            
            <!-- 表格化呈現方式 -->
            <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 border-b">
                        <tr>
                            <th class="p-4 font-semibold text-gray-700">英文</th>
                            <th class="p-4 font-semibold text-gray-700">中文</th>
                            <th class="p-4 font-semibold text-gray-700 text-center">音檔</th>
                        </tr>
                    </thead>
                    <tbody id="wordList" class="divide-y divide-gray-200">
                        <!-- 動態內容 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CSV_PATH = 'vocabulary.csv';

        const container = document.getElementById('buttonContainer');
        const weeks = 'ABCDEFGHIJKLMNOP'.split('');
        weeks.forEach(w => {
            const btn = document.createElement('button');
            btn.innerText = '週次 ' + w;
            btn.className = "bg-blue-600 text-white py-4 px-6 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg";
            btn.onclick = () => loadWordList(w);
            container.appendChild(btn);
        });

        async function loadWordList(grade) {
            try {
                const response = await fetch(CSV_PATH + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error('無法讀取 CSV 檔案');
                
                const text = await response.text();
                const rows = text.split(/\r?\n/);
                const listContainer = document.getElementById('wordList');
                
                document.getElementById('homeView').classList.add('hidden');
                document.getElementById('listView').classList.remove('hidden');
                document.getElementById('title').innerText = "週次 " + grade + " 單字列表";
                listContainer.innerHTML = '';

                rows.forEach((row, index) => {
                    if (index === 0 || !row.trim()) return;
                    const cols = row.split(',').map(s => s.trim());
                    
                    if (cols.length >= 5 && cols[1] === grade) {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-gray-50";
                        tr.innerHTML = `
                            <td class="p-4 font-bold text-lg text-blue-600">${cols[2]}</td>
                            <td class="p-4 text-gray-700">${cols[3] || ''}</td>
                            <td class="p-4 text-center">
                                ${cols[4] ? `<audio controls src="${cols[4]}" class="h-8 mx-auto"></audio>` : '<span class="text-xs text-gray-300">無</span>'}
                            </td>
                        `;
                        listContainer.appendChild(tr);
                    }
                });
            } catch (err) {
                alert('讀取失敗：' + err.message);
            }
        }
    </script>
</body>
</html>
