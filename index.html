<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語單字學習系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div id="app" class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-gray-800 text-center">英語單字學習系統</h1>
        
        <!-- 年級與學期選擇區 -->
        <div id="gradeSemesterContainer" class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-8">
            <!-- 年級學期按鈕 -->
        </div>

        <!-- 選定年級後顯示的週次選擇區 -->
        <div id="weekSelectionArea" class="hidden mb-8">
            <h2 id="selectedGradeTitle" class="text-xl font-bold mb-4 text-indigo-700"></h2>
            <div id="weekContainer" class="grid grid-cols-4 sm:grid-cols-8 gap-2">
                <!-- 週次按鈕 -->
            </div>
        </div>

        <!-- 列表顯示區 -->
        <div id="listView" class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200 hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="p-4 font-semibold text-gray-700">英文</th>
                        <th class="p-4 font-semibold text-gray-700">中文</th>
                        <th class="p-4 font-semibold text-gray-700 text-center">音檔</th>
                    </tr>
                </thead>
                <tbody id="wordList" class="divide-y divide-gray-200">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentCsvPath = 'vocabulary.csv';
        const gradeContainer = document.getElementById('gradeSemesterContainer');
        const weekContainer = document.getElementById('weekContainer');
        const semesters = ['上學期', '下學期'];

        // 初始化年級與學期按鈕
        for (let i = 1; i <= 6; i++) {
            semesters.forEach(sem => {
                const btn = document.createElement('button');
                btn.innerText = i + '年級' + sem;
                btn.className = "bg-blue-600 text-white py-3 px-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-sm text-sm";
                btn.onclick = () => showWeeks(i.toString(), sem);
                gradeContainer.appendChild(btn);
            });
        }

        // 初始化週次按鈕 (A-P)
        'ABCDEFGHIJKLMNOP'.split('').forEach(w => {
            const btn = document.createElement('button');
            btn.innerText = '週次' + w;
            btn.className = "bg-indigo-500 text-white py-2 rounded-lg font-bold hover:bg-indigo-600 transition text-xs";
            btn.onclick = () => loadWordList(w);
            weekContainer.appendChild(btn);
        });

        function showWeeks(grade, sem) {
            // 如果是六年級下學期，將路徑改為 6下.csv
            if (grade === '6' && sem === '下學期') {
                currentCsvPath = '6下.csv';
            } else {
                currentCsvPath = grade +'.csv';
            }
            
            document.getElementById('selectedGradeTitle').innerText = grade + '年級' + sem + ' (目前讀取: ' + currentCsvPath + ')';
            document.getElementById('weekSelectionArea').classList.remove('hidden');
            document.getElementById('listView').classList.add('hidden');
        }

        async function loadWordList(week) {
            try {
                const response = await fetch(currentCsvPath + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error('無法讀取 ' + currentCsvPath + '，請確認檔案是否存在');
                
                const text = await response.text();
                const rows = text.split(/\r?\n/);
                const listContainer = document.getElementById('wordList');
                const listView = document.getElementById('listView');
                
                listContainer.innerHTML = '';
                listView.classList.remove('hidden');

                rows.forEach((row, index) => {
                    if (index === 0 || !row.trim()) return;
                    const cols = row.split(',').map(s => s.trim());
                    
                    // 篩選邏輯：假設 CSV 第6欄是週次 (例如 'A', 'B', 'C'...)
                    // 如果您的 CSV 結構不同，請調整此處的 index
                    if (cols.length >= 6 && cols[5].toUpperCase() === week) {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-gray-50";
                        tr.innerHTML = `
                            <td class="p-4 font-bold text-lg text-blue-600">${cols[2]}</td>
                            <td class="p-4 text-gray-700">${cols[3] || ''}</td>
                            <td class="p-4 text-center">
                                ${cols[4] ? `<audio controls src="${cols[4]}" class="h-8 mx-auto"></audio>` : '<span class="text-xs text-gray-300">無</span>'}
                            </td>
                        `;
                        listContainer.appendChild(tr);
                    }
                });
            } catch (err) {
                alert('讀取失敗：' + err.message);
            }
        }
    </script>
</body>
</html>
